<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5eff9" />
    <meta name="application-name" content="Sarah" />
    <meta name="description" content="Private local physiology, session review, Motion Lab, AI analysis, and audio summaries." />
    <meta name="color-scheme" content="dark light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Sarah" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/icons/sarah-icon.svg" />
    <link rel="apple-touch-icon" href="/icons/sarah-180.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#10161f" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <title>Sarah</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function sarahIsStandalone() {
        return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone === true;
      }

      (function guardSarahStandaloneReloads() {
        if (!sarahIsStandalone()) return;
        window.addEventListener("vite:beforeFullReload", function (event) {
          event.preventDefault();
          console.warn("Sarah blocked a dev full reload while running as an installed app.");
        });
        window.addEventListener("beforeunload", function (event) {
          var activeAudio = Array.prototype.some.call(document.querySelectorAll("audio"), function (audio) {
            return audio && !audio.paused && !audio.ended;
          });
          if (!activeAudio) return;
          event.preventDefault();
          event.returnValue = "";
        }, { capture: true });
      })();

      (function clearSarahDevShell() {
        if (window.location.port !== "5174") return;
        if (sarahIsStandalone()) return;
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations()
            .then(function (registrations) {
              return Promise.all(registrations.map(function (registration) {
                return registration.unregister();
              }));
            })
            .catch(function (error) {
              console.warn("Sarah dev SW cleanup failed:", error);
            });
        }
        if ("caches" in window) {
          caches.keys()
            .then(function (keys) {
              return Promise.all(keys
                .filter(function (key) { return key.indexOf("pulsepoint-shell-") === 0; })
                .map(function (key) { return caches.delete(key); }));
            })
            .catch(function (error) {
              console.warn("Sarah dev shell cache cleanup failed:", error);
            });
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
