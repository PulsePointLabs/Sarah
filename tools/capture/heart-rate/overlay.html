<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>HR Overlay</title>

<style>
:root{
  --bg: rgba(15,20,25,0.94);
  --card: rgba(22,29,36,0.86);
  --border: rgba(51,65,75,0.9);
  --border-accent: rgba(45,212,191,0.32);
  --text: rgba(236,244,247,0.96);
  --muted: rgba(148,163,184,0.9);
  --teal: rgb(45,212,191);
  --violet: rgb(167,139,250);
  --baseline: rgba(148,163,184,0.82);
  --rose: rgb(251,113,133);
}

html,body{
  margin:0;
  height:100%;
  background:transparent;
  display:flex;
  align-items:flex-end;
}

#panel{
  width:100%;
  height:min(100%, 154px);
  box-sizing:border-box;
  padding:8px 12px;
  background:var(--bg);
  border:1px solid var(--border-accent);
  border-radius:16px;
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:0;
  box-shadow:0 12px 32px rgba(0,0,0,0.22), inset 0 1px rgba(255,255,255,0.025);
  backdrop-filter:blur(8px);
  transition:background .42s ease, border-color .42s ease, box-shadow .42s ease;
  overflow:hidden;
}

#panel.trend-rising{
  background:linear-gradient(100deg, rgba(74,25,34,0.94), rgba(15,20,25,0.95) 44%);
  border-color:rgba(251,113,133,0.4);
}

#panel.trend-elevated{
  background:linear-gradient(100deg, rgba(91,29,42,0.96), rgba(15,20,25,0.95) 50%);
  border-color:rgba(251,113,133,0.55);
  box-shadow:0 12px 32px rgba(0,0,0,0.22), inset 0 0 25px rgba(251,113,133,0.06);
}

#panel.trend-recovery{
  background:linear-gradient(100deg, rgba(14,57,53,0.96), rgba(15,20,25,0.95) 46%);
  border-color:rgba(45,212,191,0.42);
}

#stats{
  text-align:left;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  display:flex;
  flex-direction:row;
  align-items:center;
  flex:0 0 auto;
}

.metric{
  border-left:1px solid var(--border);
  padding:8px 15px;
  min-width:84px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.value{
  font-size:34px;
  font-weight:750;
  line-height:1;
  color:var(--text);
  font-variant-numeric:tabular-nums;
  letter-spacing:-1.5px;
}

.label{
  font-size:10px;
  font-weight:700;
  letter-spacing:1.3px;
  color:var(--muted);
  margin-bottom:5px;
  text-transform:uppercase;
}

.metric.current .value{
  color:var(--teal);
}

.metric.max .value{
  color:var(--rose);
}

#heartStatus{
  flex:0 0 120px;
  padding:8px 9px 8px 3px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:5px;
}

#heartLive{
  display:flex;
  align-items:center;
  gap:9px;
  color:var(--teal);
  font-size:13px;
  font-weight:720;
}

#heart{
  color:var(--rose);
  font-size:25px;
  line-height:1;
  display:inline-block;
  transform-origin:center;
  filter:drop-shadow(0 0 0 rgba(251,113,133,0));
}

#heart.beating{
  animation:heartBeat var(--beat-duration, .75s) ease-in-out infinite;
}

@keyframes heartBeat{
  0%, 100%{
    transform:scale(1);
    filter:drop-shadow(0 0 0 rgba(251,113,133,0));
  }
  14%{
    transform:scale(1.18);
    filter:drop-shadow(0 0 6px rgba(251,113,133,.42));
  }
  30%{
    transform:scale(.98);
  }
  43%{
    transform:scale(1.09);
    filter:drop-shadow(0 0 4px rgba(251,113,133,.28));
  }
  65%{
    transform:scale(1);
    filter:drop-shadow(0 0 0 rgba(251,113,133,0));
  }
}

@media (prefers-reduced-motion: reduce){
  #heart.beating{
    animation:none;
  }
}

#chartWrap{
  flex:1 1 auto;
  height:138px;
  min-width:340px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:4px;
  border-left:1px solid var(--border);
  margin-left:5px;
  padding:2px 14px 1px 12px;
  overflow:hidden;
}

#chartHeader{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

#chartTitle{
  color:var(--teal);
  font-size:10px;
  font-weight:750;
  letter-spacing:1.2px;
  text-transform:uppercase;
}

#chartSubtitle{
  margin-top:1px;
  color:var(--muted);
  font-size:10px;
}

#legend{
  display:flex;
  align-items:center;
  gap:9px;
  color:var(--muted);
  justify-content:center;
  font:600 10px/1 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  white-space:nowrap;
}

.legendItem{
  display:inline-flex;
  align-items:center;
  gap:5px;
}

.legendLine{
  display:inline-block;
  width:15px;
  border-top:2px solid;
}

.legendLine.baseline{
  border-top-style:dashed;
  border-color:var(--baseline);
}

.legendLine.smooth{
  border-color:var(--violet);
}

.legendLine.hr{
  border-color:var(--teal);
}

#statusRow{
  min-height:29px;
  display:flex;
  align-items:center;
}

#statusBadge{
  width:100%;
  box-sizing:border-box;
  padding:4px 7px;
  border-radius:10px;
  border:1px solid rgba(45,212,191,.24);
  background:rgba(15,20,25,0.64);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  text-align:left;
  display:none;
  box-shadow:none;
}

#statusBadge.active{
  display:block;
}

#statusLabel{
  font-size:9px;
  font-weight:800;
  letter-spacing:1px;
  color:var(--teal);
  text-transform:uppercase;
  line-height:1.1;
}

#statusTimer{
  font-size:16px;
  font-weight:750;
  line-height:1;
  margin-top:3px;
}

#chartBox{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  position:relative;
}

canvas{
  width:100% !important;
  height:100% !important;
  display:block;
}

@media (max-width: 1120px){
  #panel{padding:7px 9px;}
  #heartStatus{flex-basis:104px;padding-right:6px;}
  .metric{min-width:56px;padding:6px 7px;}
  .value{font-size:27px;}
  #chartSubtitle{display:none;}
  #chartWrap{min-width:260px;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="panel">
  <div id="heartStatus">
    <div class="label">Heart Rate</div>
    <div id="heartLive"><span id="heart">&#9829;</span><span>HR Live</span></div>
    <div id="statusRow">
      <div id="statusBadge">
        <div id="statusLabel">SUSTAINED BUILD</div>
        <div id="statusTimer">00:00</div>
      </div>
    </div>
  </div>

  <div id="stats">
    <div class="metric current">
      <div class="label">CURRENT BPM</div>
      <div class="value" id="current">--</div>
    </div>
    <div class="metric avg">
      <div class="label">AVG BPM</div>
      <div class="value" id="avg">--</div>
    </div>
    <div class="metric max">
      <div class="label">MAX BPM</div>
      <div class="value" id="max">--</div>
    </div>
  </div>

  <div id="chartWrap">
    <div id="chartHeader">
      <div>
        <div id="chartTitle">Heart Rate Trend</div>
        <div id="chartSubtitle">Current, smoothed, and baseline HR</div>
      </div>
    </div>

    <div id="chartBox">
      <canvas id="chart"></canvas>
    </div>
    <div id="legend">
      <span class="legendItem"><span class="legendLine baseline"></span>Baseline</span>
      <span class="legendItem"><span class="legendLine smooth"></span>Smoothed</span>
      <span class="legendItem"><span class="legendLine hr"></span>HR</span>
    </div>
  </div>
</div>

<script>
/*** CONNECTIONS ***/
const OBS_HOST = "ws://192.168.0.33:4455";
const HR_TEXT_SOURCE_NAME = "HR";
const CONTROL_WS_URL = "ws://127.0.0.1:8765";
const LIVE_CAPTURE_STREAM_URL = "http://127.0.0.1:8787/api/live-capture/stream";
const LIVE_CAPTURE_STATUS_URL = "http://127.0.0.1:8787/api/live-capture/status";
const OVERLAY_HR_STREAM_URL = "http://127.0.0.1:8787/api/live-capture/overlay-heart-rate/stream";
const OVERLAY_HR_STATUS_URL = "http://127.0.0.1:8787/api/live-capture/overlay-heart-rate";
const OVERLAY_BUILD_ID = "sarah-overlay-authoritative-hr-v1";

/*** POLLING / DISPLAY ***/
const POLL_MS = 1000;
const WINDOW_SEC = 240;
const DUPLICATE_SAMPLE_GUARD_MS = 750;

/*** LIVE CONFIG ***/
let cfg = {
  buildRiseMin: 5,
  buildSlopeMin: 0.28,
  buildPosRatioMin: 0.52,
  buildAccelMin: 0.00,
  buildMinSec: 3,
  buildHoldSec: 3,

  significantHrMin: 112,
  peakDropMin: 8,
  recoverySlopeMax: 0.50,
  recoveryMinSec: 1,
  recoveryHoldSec: 12
};

/*** DETECTION SMOOTHING ***/
const HR_SMOOTHING = 0.30;
let smoothedHr = null;
let lastSampleAtMs = 0;
let lastSampleBpm = null;
let liveCaptureEvents = null;
let liveCaptureConnected = false;
let lastLiveCaptureHrAtMs = 0;
let overlayHrEvents = null;
let overlayHrConnected = false;
let overlayHrSequence = 0;

/*** BASELINE ANCHOR ***/
const BASELINE_SMOOTHING = 0.03;
let baselineHr = null;

/*** ELEVATION THRESHOLDS ***/
const BUILD_ENTER_DELTA = 8;
const ELEVATED_ENTER_DELTA = 5;
const ELEVATED_EXIT_DELTA = 3;

/*** HYSTERESIS / REENTRY CONTROL ***/
let buildReentryBlockedUntil = null;
const BUILD_REENTRY_COOLDOWN_SEC = 6;

/*** OBS RECORD STATE ***/
let obsRecordingActive = false;

/*** DETECTION WINDOWS ***/
const SHORT_WINDOW_SEC = 10;
const SLOPE_WINDOW_SEC = 8;
const STEP_WINDOW_SEC = 10;
const RECOVERY_WINDOW_SEC = 14;

/*** DOM ***/
const currentEl = document.getElementById("current");
const avgEl = document.getElementById("avg");
const maxEl = document.getElementById("max");
const panelEl = document.getElementById("panel");
const heartEl = document.getElementById("heart");
const statusLabel = document.getElementById("statusLabel");
const statusTimer = document.getElementById("statusTimer");
const statusBadge = document.getElementById("statusBadge");

/*** HELPERS ***/
function mean(nums){ return nums.length ? nums.reduce((a,b)=>a+b,0)/nums.length : 0; }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

function formatTimer(sec){
  sec = Math.max(0, Math.floor(sec));
  return `${String(Math.floor(sec/60)).padStart(2,"0")}:${String(sec%60).padStart(2,"0")}`;
}

function setStatus(mode, elapsedSec){
  if(!mode){
    statusBadge.classList.remove("active");
    return;
  }

  statusBadge.classList.add("active");
  statusLabel.textContent = mode;
  statusTimer.textContent = formatTimer(elapsedSec);

  if (mode === "SUSTAINED BUILD") {
    statusBadge.style.borderColor = "rgba(251,191,36,0.42)";
    statusLabel.style.color = "rgb(251,191,36)";
  } else if (mode === "ELEVATED") {
    statusBadge.style.borderColor = "rgba(251,113,133,0.42)";
    statusLabel.style.color = "rgb(251,113,133)";
  } else if (mode === "RECOVERY") {
    statusBadge.style.borderColor = "rgba(96,165,250,0.42)";
    statusLabel.style.color = "rgb(96,165,250)";
  } else {
    statusBadge.style.borderColor = "rgba(45,212,191,0.24)";
    statusLabel.style.color = "rgb(45,212,191)";
  }
}

function formatChartTime(sec){
  return new Date(startTs + Number(sec || 0) * 1000)
    .toLocaleTimeString([], { minute:"2-digit", second:"2-digit" });
}

function setTrendVisual(mode, elevatedDelta, slope){
  panelEl.classList.remove("trend-rising", "trend-elevated", "trend-recovery");

  if (mode === "RECOVERY" || (!mode && eventWasActive && slope <= -0.18)) {
    panelEl.classList.add("trend-recovery");
  } else if (mode === "ELEVATED" || elevatedDelta >= ELEVATED_ENTER_DELTA) {
    panelEl.classList.add("trend-elevated");
  } else if (mode === "SUSTAINED BUILD" || (elevatedDelta > 1 && slope >= cfg.buildSlopeMin * 0.6)) {
    panelEl.classList.add("trend-rising");
  }
}

function computeBuildConfidence(rise, slope, posRatio, accel) {
  const riseScore = cfg.buildRiseMin > 0 ? Math.min(rise / cfg.buildRiseMin, 1.5) : 1;
  const slopeScore = cfg.buildSlopeMin > 0 ? Math.min(slope / cfg.buildSlopeMin, 1.5) : 1;
  const posScore = cfg.buildPosRatioMin > 0 ? Math.min(posRatio / cfg.buildPosRatioMin, 1.5) : 1;

  let accelScore = 1;
  if (cfg.buildAccelMin > 0) accelScore = Math.min(accel / cfg.buildAccelMin, 1.5);

  const blended =
    riseScore * 0.35 +
    slopeScore * 0.35 +
    posScore * 0.20 +
    accelScore * 0.10;

  return clamp((blended / 1.0) * 100, 0, 100);
}

/*** OBS WEBSOCKET ***/
let obsWs, rpcId = 1, pending = new Map(), startTs = Date.now();

function connectOBS(){
  return new Promise(resolve=>{
    obsWs = new WebSocket(OBS_HOST);

    obsWs.onclose = () => setTimeout(()=>connectOBS().then(resolve), 1200);

    obsWs.onmessage = e => {
      const msg = JSON.parse(e.data);

      if(msg.op === 0){
        obsWs.send(JSON.stringify({
          op: 1,
          d: { rpcVersion: msg.d.rpcVersion || 1, eventSubscriptions: 0xFFFFFFFF }
        }));
      }

      if(msg.op === 2){
        callOBS("GetRecordStatus")
          .then(status => {
            const wasActive = obsRecordingActive;
            obsRecordingActive = !!status.outputActive;

            if (!wasActive && obsRecordingActive) {
              resetOverlayState({ keepRecordingState: true });
            }
          })
          .catch(()=>{});
        resolve();
      }

      if(msg.op === 5){
        const eventType = msg.d?.eventType;
        const eventData = msg.d?.eventData || {};

        if (eventType === "InputSettingsChanged" && eventData.inputName === HR_TEXT_SOURCE_NAME) {
          ingestHRText(String(eventData.inputSettings?.text ?? ""));
        }

        if (eventType === "RecordStateChanged") {
          const wasActive = obsRecordingActive;
          obsRecordingActive = !!eventData.outputActive;

          if (!wasActive && obsRecordingActive) {
            resetOverlayState({ keepRecordingState: true });
          }
        }
      }

      if(msg.op === 7){
        const { requestId, requestStatus, responseData } = msg.d;
        const waiter = pending.get(requestId);
        pending.delete(requestId);
        if(waiter){
          if(requestStatus?.result) waiter.resolve(responseData);
          else waiter.reject(requestStatus);
        }
      }
    };
  });
}

function callOBS(type, data={}){
  return new Promise((resolve,reject)=>{
    const id = String(rpcId++);
    pending.set(id, { resolve, reject });
    obsWs.send(JSON.stringify({
      op: 6,
      d: { requestType: type, requestId: id, requestData: data }
    }));
  });
}

/*** CONTROL WEBSOCKET ***/
let controlWs;
function connectControlWS(){
  controlWs = new WebSocket(CONTROL_WS_URL);

  controlWs.onclose = () => setTimeout(connectControlWS, 1500);

  controlWs.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);

      if (msg.type === "config" && msg.config) {
        cfg = { ...cfg, ...msg.config };
      }

      if (msg.type === "reset") {
        resetOverlayState();
      }
    } catch {}
  };
}

function sendTelemetry(data) {
  if (controlWs && controlWs.readyState === WebSocket.OPEN) {
    controlWs.send(JSON.stringify({
      type: "telemetry",
      data: {
        ...data,
        origin: "obs_overlay"
      }
    }));
  }
}

function readTelemetryBpm(data) {
  const value = data?.currentHr ?? data?.heartRate ?? data?.hr ?? data?.bpm;
  const bpm = Number(value);
  return Number.isFinite(bpm) && bpm >= 25 && bpm <= 250 ? Math.round(bpm) : null;
}

function liveTelemetryAgeMs(data) {
  const timestamp = Number(data?.receivedAt ?? data?.measuredAt ?? data?.engineWallTimeMs ?? data?.timestampMs);
  if (!Number.isFinite(timestamp) || timestamp <= 0) return 0;
  return Math.max(0, Date.now() - timestamp);
}

function ingestLiveTelemetry(data) {
  if (data?.origin === "obs_overlay" || data?.raw?.origin === "obs_overlay") return;
  if (data?.sequence != null && Number(data.sequence) <= overlayHrSequence) return;
  if (data?.sequence != null) overlayHrSequence = Number(data.sequence);
  if (data?.stale || data?.connected === false) {
    markTelemetryStale();
    return;
  }
  const bpm = readTelemetryBpm(data);
  if (bpm == null) {
    markTelemetryStale();
    return;
  }
  const ageMs = Number(data?.quality?.ageMs ?? liveTelemetryAgeMs(data));
  if (Number.isFinite(ageMs) && ageMs > 7000) {
    markTelemetryStale();
    return;
  }
  lastLiveCaptureHrAtMs = Date.now();
  ingestHRText(String(bpm));
}

function liveCaptureTelemetryFresh() {
  return liveCaptureConnected && Date.now() - lastLiveCaptureHrAtMs < 5000;
}

async function loadInitialLiveCaptureStatus() {
  try {
    const overlayResponse = await fetch(OVERLAY_HR_STATUS_URL, { cache: "no-store" });
    if (overlayResponse.ok) {
      const status = await overlayResponse.json();
      ingestLiveTelemetry(status?.overlay);
      return;
    }
  } catch {}
  try {
    const response = await fetch(LIVE_CAPTURE_STATUS_URL, { cache: "no-store" });
    if (!response.ok) return;
    const status = await response.json();
    ingestLiveTelemetry(status?.hr?.latestTelemetry);
  } catch {}
}

function connectOverlayHeartRateStream() {
  if (!window.EventSource) return;
  try {
    overlayHrEvents = new EventSource(OVERLAY_HR_STREAM_URL);
    overlayHrEvents.onopen = () => {
      overlayHrConnected = true;
      liveCaptureConnected = true;
    };
    overlayHrEvents.onerror = () => {
      overlayHrConnected = false;
      liveCaptureConnected = false;
    };
    const handleOverlayEvent = (event) => {
      try {
        ingestLiveTelemetry(JSON.parse(event.data));
      } catch {}
    };
    overlayHrEvents.addEventListener("snapshot", handleOverlayEvent);
    overlayHrEvents.addEventListener("hr", handleOverlayEvent);
    overlayHrEvents.addEventListener("heartbeat", handleOverlayEvent);
  } catch {
    overlayHrConnected = false;
  }
}

function connectLiveCaptureStream() {
  if (!window.EventSource) return;
  try {
    liveCaptureEvents = new EventSource(LIVE_CAPTURE_STREAM_URL);
    liveCaptureEvents.onopen = () => {
      liveCaptureConnected = true;
    };
    liveCaptureEvents.onerror = () => {
      liveCaptureConnected = false;
    };
    liveCaptureEvents.addEventListener("status", (event) => {
      try {
        const status = JSON.parse(event.data);
        ingestLiveTelemetry(status?.hr?.latestTelemetry);
      } catch {}
    });
    liveCaptureEvents.addEventListener("hr_telemetry", (event) => {
      try {
        ingestLiveTelemetry(JSON.parse(event.data));
      } catch {}
    });
    liveCaptureEvents.addEventListener("telemetry_snapshot", (event) => {
      try {
        const snapshot = JSON.parse(event.data);
        ingestLiveTelemetry(snapshot?.hr);
      } catch {}
    });
  } catch {
    liveCaptureConnected = false;
  }
}

/*** DATA ***/
const points = [];
const detectPoints = [];
const baselinePoints = [];

/*** WINDOW HELPERS ***/
function getRecentPoints(arr, windowSec){
  if(!arr.length) return [];
  const now = arr[arr.length - 1].x;
  const left = now - windowSec;
  return arr.filter(p => p.x >= left);
}

function slopePoints(arr){
  if(arr.length < 2) return 0;
  const first = arr[0], last = arr[arr.length - 1];
  const dx = last.x - first.x;
  return dx > 0 ? (last.y - first.y) / dx : 0;
}

function positiveStepRatio(arr){
  if(arr.length < 2) return 0;
  let pos = 0, total = 0;
  for(let i=1;i<arr.length;i++){
    total++;
    if(arr[i].y >= arr[i-1].y) pos++;
  }
  return total ? pos / total : 0;
}

function accelEstimate(arr){
  if(arr.length < 3) return 0;
  const mid = Math.floor(arr.length / 2);
  const s1 = slopePoints(arr.slice(0, mid + 1));
  const s2 = slopePoints(arr.slice(mid));
  return s2 - s1;
}

function riseOverWindow(arr){
  if(arr.length < 2) return 0;
  return arr[arr.length - 1].y - arr[0].y;
}

/*** CHART ***/
const ctx = document.getElementById("chart");
const chart = new Chart(ctx,{
  type:'line',
  data:{datasets:[
    {
      data:baselinePoints,
      borderWidth:1.5,
      borderColor:'rgba(148,163,184,0.8)',
      borderDash:[5,5],
      tension:.35,
      cubicInterpolationMode:'monotone',
      pointRadius:0,
      borderCapStyle:'round',
      borderJoinStyle:'round'
    },
    {
      data:detectPoints,
      borderWidth:2,
      borderColor:'rgb(167,139,250)',
      tension:.35,
      cubicInterpolationMode:'monotone',
      pointRadius:0,
      borderCapStyle:'round',
      borderJoinStyle:'round'
    },
    {
      data:points,
      borderWidth:2.6,
      borderColor:'rgb(45,212,191)',
      tension:.35,
      cubicInterpolationMode:'monotone',
      pointRadius:0,
      borderCapStyle:'round',
      borderJoinStyle:'round'
    }
  ]},
  options:{
    responsive:true,
    maintainAspectRatio:false,
    animation:false,
    plugins:{legend:{display:false},tooltip:{enabled:false}},
    layout:{padding:{top:4,right:9,bottom:1,left:0}},
    scales:{
      x:{
        display:true,
        type:'linear',
        min:-WINDOW_SEC,
        max:0,
        ticks:{
          color:'rgba(148,163,184,0.9)',
          font:{size:9},
          maxTicksLimit:6,
          callback:(value) => formatChartTime(value)
        },
        border:{display:false},
        grid:{color:'rgba(51,65,75,0.34)'}
      },
      y:{
        display:true,
        ticks:{
          display:true,
          color:'rgba(148,163,184,0.9)',
          font:{size:9},
          maxTicksLimit:3,
          callback:(value) => Math.round(value)
        },
        border:{display:false},
        grid:{color:'rgba(51,65,75,0.42)',borderDash:[3,3]}
      }
    }
  }
});

/*** DISPLAY ***/
function advanceWindow(){
  const now = (Date.now() - startTs) / 1000;
  const left = now - WINDOW_SEC;

  while(points.length && points[0].x < left) points.shift();
  while(detectPoints.length && detectPoints[0].x < left) detectPoints.shift();
  while(baselinePoints.length && baselinePoints[0].x < left) baselinePoints.shift();

  chart.options.scales.x.min = left;
  chart.options.scales.x.max = now;

  const visibleValues = [...points, ...detectPoints, ...baselinePoints]
    .filter((point) => point.x >= left)
    .map((point) => Number(point.y))
    .filter(Number.isFinite);
  if (visibleValues.length) {
    const visibleMin = Math.min(...visibleValues);
    const visibleMax = Math.max(...visibleValues);
    const span = Math.max(visibleMax - visibleMin, 4);
    const padding = Math.max(4, Math.round(span * 0.12));
    chart.options.scales.y.min = Math.floor(visibleMin - padding);
    chart.options.scales.y.max = Math.ceil(visibleMax + padding);
  } else {
    delete chart.options.scales.y.min;
    delete chart.options.scales.y.max;
  }
  chart.update('none');
}

function updateStats(){
  if(!points.length) return;
  const ys = points.map(p => p.y);
  const currentBpm = Math.round(ys[ys.length - 1]);
  const waitingForLine = points.length < 2;
  chart.data.datasets[1].pointRadius = waitingForLine ? 2 : 0;
  chart.data.datasets[2].pointRadius = waitingForLine ? 2.5 : 0;
  currentEl.textContent = currentBpm || "--";
  avgEl.textContent = Math.round(mean(ys)) || "--";
  maxEl.textContent = Math.round(Math.max(...ys)) || "--";
  if (currentBpm > 0) {
    heartEl.style.setProperty("--beat-duration", `${60 / currentBpm}s`);
    heartEl.classList.add("beating");
  }
}

function markTelemetryStale(){
  if (points.length && Date.now() - lastLiveCaptureHrAtMs < 7000) return;
  currentEl.textContent = "--";
  heartEl.classList.remove("beating");
  heartEl.style.removeProperty("--beat-duration");
}

function updateBaseline(currentSmoothedHr){
  if (baselineHr === null) {
    baselineHr = currentSmoothedHr;
    return;
  }

  if (!eventWasActive && currentPhase !== "SUSTAINED BUILD" && currentPhase !== "ELEVATED" && currentPhase !== "RECOVERY") {
    baselineHr = baselineHr + (currentSmoothedHr - baselineHr) * BASELINE_SMOOTHING;
  }
}

/*** PHASE STATE ***/
let currentPhase = null;
let phaseStartTs = 0;

let buildCandidateStart = null;
let elevatedCandidateStart = null;
let recoveryCandidateStart = null;

let buildHoldUntil = null;
let elevatedHoldUntil = null;
let recoveryHoldUntil = null;

let eventPeakHr = null;
let eventWasActive = false;

function transitionPhase(newPhase, nowSec){
  if(newPhase !== currentPhase){
    if (currentPhase === "SUSTAINED BUILD" && newPhase === "ELEVATED") {
      buildReentryBlockedUntil = nowSec + BUILD_REENTRY_COOLDOWN_SEC;
    }
    currentPhase = newPhase;
    phaseStartTs = nowSec;
  }
}

function phaseElapsed(nowSec){ return nowSec - phaseStartTs; }

function resetOverlayState(options = {}){
  const keepRecordingState = !!options.keepRecordingState;

  currentPhase = null;
  phaseStartTs = 0;
  buildCandidateStart = null;
  elevatedCandidateStart = null;
  recoveryCandidateStart = null;
  buildHoldUntil = null;
  elevatedHoldUntil = null;
  recoveryHoldUntil = null;
  buildReentryBlockedUntil = null;
  eventPeakHr = null;
  eventWasActive = false;
  points.length = 0;
  detectPoints.length = 0;
  baselinePoints.length = 0;
  startTs = Date.now();
  smoothedHr = null;
  baselineHr = null;
  lastSampleAtMs = 0;
  lastSampleBpm = null;
  currentEl.textContent = "--";
  avgEl.textContent = "--";
  maxEl.textContent = "--";
  heartEl.classList.remove("beating");
  heartEl.style.removeProperty("--beat-duration");
  chart.data.datasets[1].pointRadius = 0;
  chart.data.datasets[2].pointRadius = 0;

  if (!keepRecordingState) {
    obsRecordingActive = false;
  }

  setStatus(null, 0);
  setTrendVisual(null, 0, 0);
  chart.update('none');

  sendTelemetry({
    phase: null,
    buildConfidence: 0,
    currentHr: null,
    smoothedHr: null,
    baselineHr: null,
    elevatedDelta: null,
    phaseTimer: "—"
  });
}

function updatePhase(features, nowSec){
  const {
    currentHr,
    rise,
    slope,
    posRatio,
    accel,
    recoverySlope
  } = features;

  const elevatedDelta = baselineHr === null ? 0 : (currentHr - baselineHr);
  const buildConfidence = computeBuildConfidence(rise, slope, posRatio, accel);
  const dropFromPeak = eventPeakHr !== null ? (eventPeakHr - currentHr) : 0;

  const buildRampNow =
    rise >= cfg.buildRiseMin &&
    slope >= cfg.buildSlopeMin &&
    posRatio >= cfg.buildPosRatioMin &&
    accel >= cfg.buildAccelMin;

  const strongBuildRampNow =
    rise >= (cfg.buildRiseMin + 2) &&
    slope >= (cfg.buildSlopeMin + 0.08) &&
    posRatio >= Math.min(cfg.buildPosRatioMin + 0.08, 0.95) &&
    accel >= cfg.buildAccelMin;

  const elevatedNow =
    elevatedDelta >= ELEVATED_ENTER_DELTA ||
    (
      (currentPhase === "SUSTAINED BUILD" || currentPhase === "ELEVATED" || elevatedHoldUntil !== null || currentPhase === "RECOVERY") &&
      elevatedDelta >= ELEVATED_EXIT_DELTA
    );

  const initialBuildNow =
    buildRampNow ||
    (
      elevatedDelta >= BUILD_ENTER_DELTA &&
      slope >= Math.max(cfg.buildSlopeMin * 0.80, 0.16)
    );

  const canReenterBuild =
    (buildReentryBlockedUntil === null || nowSec >= buildReentryBlockedUntil) &&
    strongBuildRampNow &&
    (
      eventPeakHr === null ||
      currentHr >= (eventPeakHr - 1)
    );

  let buildNow = false;
  if (currentPhase === "ELEVATED") {
    buildNow = canReenterBuild;
  } else {
    buildNow = initialBuildNow;
  }

  if(buildNow){
    if(buildCandidateStart === null) buildCandidateStart = nowSec;
  } else {
    buildCandidateStart = null;
  }

  if(elevatedNow){
    if(elevatedCandidateStart === null) elevatedCandidateStart = nowSec;
  } else {
    elevatedCandidateStart = null;
  }

  const buildQualified =
    buildCandidateStart !== null &&
    (nowSec - buildCandidateStart) >= cfg.buildMinSec;

  const elevatedQualified =
    elevatedCandidateStart !== null &&
    (nowSec - elevatedCandidateStart) >= 1;

  const strongRecoveryNow =
    eventWasActive &&
    eventPeakHr !== null &&
    eventPeakHr >= cfg.significantHrMin &&
    dropFromPeak >= cfg.peakDropMin;

  const recoveryNow =
    strongRecoveryNow ||
    (
      eventWasActive &&
      eventPeakHr !== null &&
      eventPeakHr >= cfg.significantHrMin &&
      dropFromPeak >= Math.max(cfg.peakDropMin - 2, 4) &&
      recoverySlope <= cfg.recoverySlopeMax
    ) ||
    (
      eventWasActive &&
      eventPeakHr !== null &&
      eventPeakHr >= cfg.significantHrMin &&
      elevatedDelta <= ELEVATED_EXIT_DELTA
    );

  if(recoveryNow){
    if(recoveryCandidateStart === null) recoveryCandidateStart = nowSec;
  } else {
    recoveryCandidateStart = null;
  }

  const recoveryQualified =
    recoveryCandidateStart !== null &&
    (nowSec - recoveryCandidateStart) >= cfg.recoveryMinSec;

  /* Priority order:
     1) RECOVERY
     2) SUSTAINED BUILD
     3) ELEVATED
     4) NONE
  */

  if(recoveryQualified){
    recoveryHoldUntil = nowSec + cfg.recoveryHoldSec;
    if(currentPhase !== "RECOVERY"){
      transitionPhase("RECOVERY", nowSec);
    }
  } else if(recoveryHoldUntil !== null && nowSec <= recoveryHoldUntil){
    if(currentPhase !== "RECOVERY"){
      transitionPhase("RECOVERY", nowSec);
    }
  } else if(buildQualified){
    eventWasActive = true;
    eventPeakHr = eventPeakHr === null ? currentHr : Math.max(eventPeakHr, currentHr);

    buildHoldUntil = nowSec + cfg.buildHoldSec;
    elevatedHoldUntil = nowSec + Math.max(cfg.buildHoldSec, 4);
    recoveryCandidateStart = null;
    recoveryHoldUntil = null;

    if(currentPhase !== "SUSTAINED BUILD"){
      transitionPhase("SUSTAINED BUILD", nowSec);
    }
  } else if(
    buildHoldUntil !== null &&
    nowSec <= buildHoldUntil &&
    currentPhase === "SUSTAINED BUILD" &&
    elevatedDelta >= ELEVATED_EXIT_DELTA
  ){
    eventWasActive = true;
    eventPeakHr = eventPeakHr === null ? currentHr : Math.max(eventPeakHr, currentHr);

    if(currentPhase !== "SUSTAINED BUILD"){
      transitionPhase("SUSTAINED BUILD", nowSec);
    }
  } else if(elevatedQualified){
    eventWasActive = true;
    eventPeakHr = eventPeakHr === null ? currentHr : Math.max(eventPeakHr, currentHr);

    buildHoldUntil = null;
    elevatedHoldUntil = nowSec + 6;

    if(currentPhase !== "ELEVATED"){
      transitionPhase("ELEVATED", nowSec);
    }
  } else if(
    elevatedHoldUntil !== null &&
    nowSec <= elevatedHoldUntil &&
    elevatedDelta >= ELEVATED_EXIT_DELTA
  ){
    eventWasActive = true;
    eventPeakHr = eventPeakHr === null ? currentHr : Math.max(eventPeakHr, currentHr);

    if(currentPhase !== "ELEVATED"){
      transitionPhase("ELEVATED", nowSec);
    }
  } else {
    buildHoldUntil = null;
    elevatedHoldUntil = null;
    recoveryHoldUntil = null;
    currentPhase = null;
    recoveryCandidateStart = null;

    if(elevatedDelta <= 1){
      eventPeakHr = null;
      eventWasActive = false;
      buildReentryBlockedUntil = null;
    }
  }

  if(currentPhase === "RECOVERY" && buildQualified){
    transitionPhase("SUSTAINED BUILD", nowSec);
    recoveryCandidateStart = null;
    recoveryHoldUntil = null;
  } else if(currentPhase === "RECOVERY" && !buildQualified && elevatedQualified && !strongRecoveryNow){
    transitionPhase("ELEVATED", nowSec);
    recoveryCandidateStart = null;
    recoveryHoldUntil = null;
  }

  setStatus(currentPhase, currentPhase ? phaseElapsed(nowSec) : 0);
  setTrendVisual(currentPhase, elevatedDelta, slope);

  sendTelemetry({
    phase: currentPhase || null,
    buildConfidence,
    currentHr: points.length ? points[points.length - 1].y : null,
    smoothedHr,
    baselineHr,
    elevatedDelta,
    phaseTimer: currentPhase ? formatTimer(phaseElapsed(nowSec)) : "—"
  });
}

/*** MAIN LOOP ***/
function ingestHRText(text) {
  const m = String(text ?? "").trim().match(/\d{1,3}/);
  if (!m) return;

  const bpm = parseInt(m[0], 10);
  const nowMs = Date.now();
  if (bpm === lastSampleBpm && nowMs - lastSampleAtMs < DUPLICATE_SAMPLE_GUARD_MS) return;

  lastSampleBpm = bpm;
  lastSampleAtMs = nowMs;

  const nowSec = (nowMs - startTs) / 1000;
  points.push({ x: nowSec, y: bpm });

  if (smoothedHr === null) {
    smoothedHr = bpm;
  } else {
    smoothedHr = smoothedHr + (bpm - smoothedHr) * HR_SMOOTHING;
  }
  detectPoints.push({ x: nowSec, y: smoothedHr });

  updateBaseline(smoothedHr);
  baselinePoints.push({ x: nowSec, y: baselineHr });

  const shortPts = getRecentPoints(detectPoints, SHORT_WINDOW_SEC);
  const slopePts = getRecentPoints(detectPoints, SLOPE_WINDOW_SEC);
  const stepPts = getRecentPoints(detectPoints, STEP_WINDOW_SEC);
  const recoveryPts = getRecentPoints(detectPoints, RECOVERY_WINDOW_SEC);

  const rise = riseOverWindow(shortPts);
  const slope = slopePoints(slopePts);
  const posRatio = positiveStepRatio(stepPts);
  const accel = accelEstimate(stepPts);
  const recoverySlope = slopePoints(recoveryPts);

  updateStats();
  advanceWindow();

  updatePhase({
    currentHr: smoothedHr,
    rise,
    slope,
    posRatio,
    accel,
    recoverySlope
  }, nowSec);
}

async function pollHR(){
  if (overlayHrConnected || liveCaptureTelemetryFresh()) {
    setTimeout(pollHR, POLL_MS);
    return;
  }
  try{
    const resp = await callOBS("GetInputSettings", { inputName: HR_TEXT_SOURCE_NAME });
    ingestHRText(resp.inputSettings?.text);
  } catch(err){
    console.error(err);
  } finally {
    setTimeout(pollHR, POLL_MS);
  }
}

(async()=>{
  connectControlWS();
  connectOverlayHeartRateStream();
  connectLiveCaptureStream();
  loadInitialLiveCaptureStatus();
  await connectOBS();
  pollHR();
})();
</script>
